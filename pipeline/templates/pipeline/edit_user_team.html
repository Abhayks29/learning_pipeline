{% extends 'pipeline/base.html' %}

{% block title %}Edit Team{% endblock %}

{% block content %}
<div style="max-width:400px; margin: 2rem auto;">
  <a href="{% url 'admin_users' %}" class="btn btn-secondary btn-sm" style="margin-bottom:1.5rem;">&larr; Back</a>
  <div class="card">
    <h2 style="margin-bottom:1.5rem;">Change Team for {{ target_user.username }}</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Team / Role</label>
        {{ form.team }}
      </div>
      <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'admin_users' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
