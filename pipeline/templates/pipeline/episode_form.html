{% extends 'pipeline/base.html' %}

{% block title %}{{ action }} Episode{% endblock %}

{% block content %}
<div style="max-width:600px; margin: 2rem auto;">
  <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-sm" style="margin-bottom:1.5rem;">&larr; Back</a>

  <div class="card">
    <h2 style="margin-bottom:1.5rem;">{{ action }} Episode</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Episode Title *</label>
        {{ form.title }}
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        {{ form.description }}
      </div>
      <div class="form-group">
        <label class="form-label">Tags <span style="color:var(--muted); font-size:0.8rem;">(comma separated)</span></label>
        {{ form.tags }}
        <div style="font-size:0.75rem; color:var(--muted); margin-top:0.3rem;">e.g. python, beginner, data-science</div>
      </div>
      <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn btn-primary">{{ action }} Episode</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
